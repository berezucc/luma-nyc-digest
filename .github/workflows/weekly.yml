name: Weekly Luma Digest

on:
  schedule:
    # Mondays and Thursdays 14:00 UTC (10:00 AM ET during DST, 09:00 AM ET otherwise)
    - cron: "0 14 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Run digest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m src.main

      - name: Commit updated SQLite state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen.sqlite 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update seen events"
            git push
          else
            echo "No changes to seen.sqlite"
          fi
